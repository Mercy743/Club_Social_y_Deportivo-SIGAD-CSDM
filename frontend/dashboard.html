<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - SIGAD</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dashboardPage">

<div class="dashboardTopbar">
    <div>
        <h1>SIGAD - Panel de Control</h1>
        <p id="userInfo"></p>
        <p id="welcomeMessage" class="dashboardHeader">¿Qué quieres hacer hoy?</p>
    </div>
    <div class="topbarActions">
        <button id="logoutBtn" class="logoutBtn">Cerrar Sesión</button>
    </div>
</div>

<div class="dashboardLayout">
    
    <!-- PANEL IZQUIERDO: CONTENIDO PRINCIPAL -->
    <div id="mainPanel">
        <div class="dashboardCard" id="contentPanel">
            <h2> Resumen del Sistema</h2>
            <div id="stats" class="statsCard">Cargando estadísticas...</div>
        </div>
    </div>

    <div>
        
        <!-- Botones rápidos -->
        <div class="dashboardCard">
            <h2> Acciones Rápidas</h2>
            <div class="quickActions">
                <button class="quickBtn" onclick="window.location.href='usuarios.html'"> Usuarios</button>
                <button class="quickBtn" onclick="window.location.href='eventos.html'"> Eventos</button>
                <button class="quickBtn" onclick="window.location.href='pagos.html'"> Pagos</button>
                <button class="quickBtn" onclick="window.location.href='torneos.html'"> Torneos</button>
                <button class="quickBtn" onclick="window.location.href='reservaciones.html'"> Reservaciones</button>
            </div>
        </div>

        <div class="dashboardCard" id="statsPanel">
            <h2> Estadísticas</h2>
            <div id="dashboardStats" class="statsCard">Cargando...</div>
        </div>

        <!-- Alertas -->
        <div class="dashboardCard">
            <h2> Alertas</h2>
            <div id="alerts" class="statsCard">
                <div class="statBox">
                    <span>Usuarios sin pago reciente</span>
                    <strong id="sinPagos">0</strong>
                </div>
                <div class="statBox">
                    <span>Usuarios inactivos</span>
                    <strong id="inactivos">0</strong>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="Js/dashboard.js"></script>
</body>
</html>
