<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registrar Socio</title>
  <link rel="stylesheet" href="stylee.css">
</head>
<body>



<div class="container">

  <h2>Registro de Socio</h2>

  <form id="registroForm">

    <div class="campo">
      <label for="nombre">Nombre</label>
      <input id="nombre" type="text" placeholder="Ingresa tu nombre" required>
    </div>

    <div class="campo">
      <label for="apellido">Apellido</label>
      <input id="apellido" type="text" placeholder="Ingresa tu apellido" required>
    </div>

    <div class="campo">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="correo@ejemplo.com" required>
    </div>

    <div class="campo">
      <label for="password">Contraseña</label>
      <input id="password" type="password" placeholder="********" required>
    </div>

    <div class="campo">
      <label for="telefono">Teléfono</label>
      <input id="telefono" type="text" placeholder="4431234567">
    </div>

    <div class="campo">
      <label for="ine">INE</label>
      <input id="ine" type="text" placeholder="Clave INE" required>
    </div>

    <div class="campo">
      <label for="direccion">Dirección</label>
      <input id="direccion" type="text" placeholder="Dirección completa" required>
    </div>

    <button type="submit">Registrar</button>

  </form>

  <p id="mensaje"></p>

</div>


<script src="js/registro.js"></script>

</body>
</html>
