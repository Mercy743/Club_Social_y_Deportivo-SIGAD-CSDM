<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Landing Pro</title>
<link rel="stylesheet" href="stylee.css">
</head>
<body>

<!-- NAVBAR -->
<header class="nav">
  <h2>MI SITIO</h2>
  <div class="menu">MENU ☰</div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Mi Proyecto</h1>
  <p>Sobre el sitio</p>
  <div class="scroll">↓</div>
</section>

<!-- SECCION TEXTO -->
<section class="about">
  <h2>NUESTRO CLUB</h2>
  <p>
    Aquí va tu texto largo como en la página original...
  </p>
</section>

<!-- BLOQUE 1 -->
<section class="split">
  <div class="img"></div>
  <div class="text">
    <h2>SALÓN DE EVENTOS</h2>
    <p>Texto descriptivo...</p>
    <button>Informes</button>
  </div>
</section>

<!-- BLOQUE 2 (invertido) -->
<section class="split reverse">
  <div class="img"></div>
  <div class="text">
    <h2>RESTAURANTE</h2>
    <p>Texto descriptivo...</p>
    <button>Ver menú</button>
  </div>
</section>

<!-- GALERIA -->
<section class="gallery">
  <h2>GALERÍA</h2>
  <div class="grid">
    <div></div>
    <div></div>
    <div></div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>Contacto y redes</p>
</footer>

</body>
</html>
