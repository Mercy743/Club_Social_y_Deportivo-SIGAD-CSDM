<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registrar Socio</title>
</head>
<body>

<h2>Registro de Socio</h2>

<form id="registroForm">
  <input id="nombre" placeholder="Nombre" required><br>
  <input id="apellido" placeholder="Apellido" required><br>
  <input id="email" placeholder="Email" required><br>
  <input id="password" type="password" placeholder="Password" required><br>
  <input id="telefono" placeholder="Teléfono"><br>
  <input id="ine" placeholder="INE" required><br>
  <input id="direccion" placeholder="Dirección" required><br>

  <button type="submit">Registrar</button>
</form>

<p id="mensaje"></p>

<script src="registro.js"></script>

</body>
</html>
