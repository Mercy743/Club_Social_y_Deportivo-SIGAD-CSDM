<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SIGAD - Sistema de Gestión Deportiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="particles"></div>

<div class="container">
    <div class="leftPanel">
        <img src="images/logo.png" class="logo" alt="Logo SIGAD">
        <h1>Tu santuario personal de alto rendimiento.</h1>
        <p id="motivationalText" class="motivational"></p>
    </div>

    <div class="rightPanel">
        <div class="loginContainer">
            <h2>SIGAD</h2>
            <p class="subtitle">Sistema de Gestión Deportiva</p>

            <form id="loginForm">
                <input type="email" id="email" placeholder="Correo electrónico" required>
                <input type="password" id="password" placeholder="Contraseña" required>
                <button type="submit">Iniciar sesión</button>
            </form>

            <!-- Botón para volver al main -->
            <button type="button" onclick="window.location.href='main.html'" 
                    style="background: rgba(255,255,255,0.1); margin-top: 10px;">
                 Volver al Inicio
            </button>


            <p id="message" class="error-message"></p>
        </div>
    </div>
</div>
<script src="js/comunes.js"></script>
<script src="js/script.js"></script>
</body>
</html>
