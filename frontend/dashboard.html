<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - SIGAD</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="particles"></div>

<div class="dashboardPage">

    <!-- HEADER -->
    <header class="dashboardTopbar">
        <div>
            <h1>SIGAD</h1>
            <p id="userInfo"></p>
        </div>

        <div class="topbarActions">
            <a href="eventos.html" class="secondaryBtn">Ver reporte</a>
            <button class="logoutBtn" onclick="logout()">Cerrar sesion</button>
        </div>
    </header>

    <main class="dashboardLayout">

        <!-- EVENTOS -->
        <section id="eventPanel" class="dashboardCard" style="display:none;">
            <h2>Gestion de Eventos</h2>

            <div class="eventForm">
                <input type="text" id="eventName" placeholder="Nombre del evento">
                <input type="date" id="eventDate">
                <input type="text" id="eventDesc" placeholder="Descripcion">
                <button onclick="createEvent()">Guardar evento</button>
            </div>

            <div id="eventList" class="eventListGrid"></div>
        </section>

        <!-- USUARIOS (ADMIN) -->
        <section id="userPanel" class="dashboardCard" style="display:none;">
            <h2>Usuarios</h2>
            <div id="userList"></div>
        </section>

        <!-- ESTADISTICAS -->
        <aside id="statsPanel" class="dashboardCard statsCard" style="display:none;">
            <h2>Estadisticas</h2>

            <div class="statBox">
                <span>Total de eventos</span>
                <strong id="totalEventos">0</strong>
            </div>

            <div class="statBox">
                <span>Total de usuarios</span>
                <strong id="totalUsuarios">0</strong>
            </div>
        </aside>

    </main>
</div>

<script src="js/dashboard.js"></script>

</body>
</html>
